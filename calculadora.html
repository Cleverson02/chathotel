<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Calculadora de Retorno — Chat Hotel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&family=Chakra+Petch:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="styles.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23D4B36A'>💎</text></svg>"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Design system tokens -->
  <script type="text/babel" src="tokens.jsx"></script>
  <!-- Calculadora app -->
  <script type="text/babel" src="calculadora-app.jsx"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
    }

    html {
      scroll-behavior: smooth;
    }

    /* Header/Nav */
    nav {
      background: var(--bg);
      border-bottom: 1px solid var(--line);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      color: var(--brand);
      text-decoration: none;
      font-family: var(--font-display);
    }

    .logo:hover {
      opacity: 0.8;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .nav-link {
      color: var(--fg-muted);
      text-decoration: none;
      font-size: 14px;
      transition: color 200ms;
    }

    .nav-link:hover {
      color: var(--brand);
    }

    .nav-btn {
      padding: 10px 18px;
      background: var(--brand);
      color: var(--bg);
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 200ms;
    }

    .nav-btn:hover {
      background: var(--accent);
    }
  </style>
</head>
<body class="grain">

<nav>
  <div class="nav-container">
    <a href="/" class="logo">💎 Chat Hotel</a>
    <div class="nav-links">
      <a href="/" class="nav-link">Voltar para LP</a>
      <a href="https://wa.me/5511987654321" class="nav-btn">WhatsApp</a>
    </div>
  </div>
</nav>

<div id="root"></div>

<script type="text/babel">
  const TWEAK_DEFAULTS = {
    "palette": "midnight",
    "typePair": "editorial",
    "darkMode": true
  };

  function applyTokens(paletteKey, typeKey, dark) {
    const palette = (dark ? PALETTES : PALETTES_LIGHT)[paletteKey];
    const type = TYPE_PAIRS[typeKey];
    const r = document.documentElement.style;
    Object.entries({
      '--bg': palette.bg, '--bg-elev': palette.bgElev, '--surface': palette.surface,
      '--line': palette.line, '--fg': palette.fg, '--fg-muted': palette.fgMuted,
      '--fg-subtle': palette.fgSubtle, '--brand': palette.brand, '--brand-soft': palette.brandSoft,
      '--accent': palette.accent, '--accent-soft': palette.accentSoft, '--glow': palette.glow,
      '--font-display': type.display, '--font-body': type.body, '--font-mono': type.mono,
    }).forEach(([k, v]) => r.setProperty(k, v));
  }

  applyTokens(TWEAK_DEFAULTS.palette, TWEAK_DEFAULTS.typePair, TWEAK_DEFAULTS.darkMode);

  ReactDOM.createRoot(document.getElementById('root')).render(<CalculadoraApp/>);
</script>

</body>
</html>
